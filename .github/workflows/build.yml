name: Build macOS App

on:
  push:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv add --dev pyinstaller

      - name: Build app
        run: uv run pyinstaller main.spec --clean --noconfirm

      - name: Zip app bundle
        run: |
          cd dist
          mv Orbit.app Orbit-${{ github.sha }}.app
          zip -r Orbit-${{ github.sha }}-mac.zip Orbit-${{ github.sha }}.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Orbit-${{ github.sha }}-mac
          path: dist/Orbit-${{ github.sha }}-mac.zip
